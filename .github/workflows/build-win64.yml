name: Build LBM_post_process Win64

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-win64:
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up 64-bit Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Install Python build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Run core tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build standalone application
        shell: pwsh
        run: python -m PyInstaller --noconfirm --clean LBM_post_process.spec

      - name: Run packaged dependency self-test
        shell: pwsh
        run: .\dist\LBM_post_process\LBM_post_process.exe --self-test

      - name: Create portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path dist\LBM_post_process -DestinationPath release\LBM_post_process_win64_portable.zip -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Create Win64 installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\LBM_post_process.iss"'

      - name: Upload Win64 deliverables
        uses: actions/upload-artifact@v4
        with:
          name: LBM_post_process-win64
          path: |
            release/LBM_post_process_Setup_win64.exe
            release/LBM_post_process_win64_portable.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
